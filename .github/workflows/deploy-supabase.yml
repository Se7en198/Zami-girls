name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main, claude/plan-runpod-deployment-UjZRF]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy runpod-proxy
        run: supabase functions deploy runpod-proxy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set RunPod secrets
        run: |
          supabase secrets set RUNPOD_API_KEY=${{ secrets.RUNPOD_API_KEY }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase secrets set RUNPOD_ENDPOINT_ID=${{ secrets.RUNPOD_ENDPOINT_ID }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
